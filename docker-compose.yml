services:
  workspace:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    working_dir: /workspace
    command: sleep infinity
    env_file:
      - .env
    environment:
      API_PROXY_TARGET: http://api:3001
      npm_config_store_dir: /pnpm/store
    volumes:
      - .:/workspace
      - workspace_node_modules:/workspace/node_modules
      - frontend_node_modules:/workspace/apps/frontend/node_modules
      - api_node_modules:/workspace/apps/api/node_modules
      - pnpm_store:/pnpm/store
      - codex_config:/root/.codex
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      target: dev
    working_dir: /workspace
    command: sh -lc "flock /workspace/.pnpm-install.lock pnpm install --no-frozen-lockfile && pnpm --filter @street-art/frontend dev:docker"
    env_file:
      - .env
    environment:
      API_PROXY_TARGET: http://api:3001
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      npm_config_store_dir: /pnpm/store
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace
      - workspace_node_modules:/workspace/node_modules
      - frontend_node_modules:/workspace/apps/frontend/node_modules
      - pnpm_store:/pnpm/store
    depends_on:
      api:
        condition: service_started

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: dev
    working_dir: /workspace
    command: sh -lc "flock /workspace/.pnpm-install.lock pnpm install --no-frozen-lockfile && pnpm --filter @street-art/api dev"
    env_file:
      - .env
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      npm_config_store_dir: /pnpm/store
    ports:
      - "3001:3001"
    volumes:
      - .:/workspace
      - workspace_node_modules:/workspace/node_modules
      - api_node_modules:/workspace/apps/api/node_modules
      - pnpm_store:/pnpm/store
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgis/postgis:17-3.5
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]

volumes:
  workspace_node_modules:
  frontend_node_modules:
  api_node_modules:
  postgres_data:
  pnpm_store:
  codex_config:
